<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>蜜雪冰城700米保护圈地图</title>

  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    #panel {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 999;
      background: white;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 10px #999;
      font-size: 14px;
    }

    input, button {
      height: 30px;
      margin: 4px;
    }

    #result {
      margin-top: 8px;
      line-height: 1.6;
      max-width: 260px;
    }
  </style>

  <!-- 这里填你的安全密钥 -->
  <script>
    window._AMapSecurityConfig = {
      securityJsCode: "1bfe2616169779ee7c350d5299c441b8"
    };
  </script>

  <!-- 这里填你的 JSAPIKey -->
  <script src="https://webapi.amap.com/maps?v=2.0&key=233bf77ae060be738d6e2caf902ecdbf&plugin=AMap.PlaceSearch,AMap.GeometryUtil"></script>
</head>

<body>
  <div id="panel">
    <div>
      城市：
      <input id="city" value="郑州市" />
    </div>

    <div>
      品牌：
      <input id="keyword" value="蜜雪冰城" />
    </div>

    <div>
      半径：
      <input id="radius" value="700" /> 米
    </div>

    <button onclick="searchStores()">检测覆盖范围</button>

    <div id="result">点击“检测覆盖范围”开始</div>
  </div>

  <div id="map"></div>

  <script>
    // 初始化地图
    let map = new AMap.Map("map", {
      zoom: 12,
      center: [113.625351, 34.746303]
    });

    let markers = [];
    let circles = [];
    let stores = [];
    let testMarker = null;

    // 清空地图上的旧门店和旧圆圈
    function clearMap() {
      markers.forEach(marker => {
        map.remove(marker);
      });

      circles.forEach(circle => {
        map.remove(circle);
      });

      markers = [];
      circles = [];
      stores = [];

      if (testMarker) {
        map.remove(testMarker);
        testMarker = null;
      }
    }

    // 根据地图缩放级别，控制是否显示店名
    function updateLabels() {
      const zoom = map.getZoom();

      markers.forEach((marker, index) => {
        if (zoom >= 15) {
          marker.setLabel({
            direction: "top",
            offset: new AMap.Pixel(0, -5),
            content: `<div style="
              background:white;
              border:1px solid #ff4d4f;
              padding:2px 5px;
              border-radius:4px;
              font-size:11px;
              color:#d60000;
              white-space:nowrap;
              box-shadow:0 1px 4px rgba(0,0,0,0.2);
            ">${stores[index].name}</div>`
          });
        } else {
          marker.setLabel(null);
        }
      });
    }

    // 监听地图缩放：放大到15级以上才显示店名
    map.on("zoomend", function () {
      updateLabels();
    });

    // 搜索门店，并画保护圈
    function searchStores() {
      clearMap();

      const city = document.getElementById("city").value;
      const keyword = document.getElementById("keyword").value;
      const radius = Number(document.getElementById("radius").value);

      document.getElementById("result").innerHTML = "正在搜索，请稍等...";

      map.setCity(city);

      const placeSearch = new AMap.PlaceSearch({
        city: city,
        citylimit: true,
        pageSize: 50,
        pageIndex: 1
      });

      placeSearch.search(keyword, function(status, result) {
        if (status !== "complete" || !result.poiList || !result.poiList.pois) {
          alert("没有搜到门店，请检查城市或品牌名称");
          document.getElementById("result").innerHTML = "没有搜到门店";
          return;
        }

        const pois = result.poiList.pois;

        pois.forEach(poi => {
          const lng = poi.location.lng;
          const lat = poi.location.lat;

          stores.push({
            name: poi.name,
            address: poi.address,
            lng: lng,
            lat: lat
          });

          // 小一点、好看一点的红色箭头
          const marker = new AMap.Marker({
            position: [lng, lat],
            title: poi.name,
            map: map,

            icon: new AMap.Icon({
              image: "https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png",
              size: new AMap.Size(20, 28),
              imageSize: new AMap.Size(20, 28)
            }),

            offset: new AMap.Pixel(-10, -28)
          });

          // 点击红色箭头，显示具体门店信息
          const infoWindow = new AMap.InfoWindow({
            content: `
              <div style="font-size:14px;line-height:1.6;">
                <b>${poi.name}</b><br/>
                地址：${poi.address || "暂无地址"}<br/>
                经纬度：${lng}, ${lat}
              </div>
            `,
            offset: new AMap.Pixel(0, -28)
          });

          marker.on("click", function () {
            infoWindow.open(map, marker.getPosition());
          });

          // 画700米保护圈
          const circle = new AMap.Circle({
            center: new AMap.LngLat(lng, lat),
            radius: radius,
            strokeColor: "#ff0000",
            strokeWeight: 2,
            strokeOpacity: 0.8,
            fillColor: "#ff0000",
            fillOpacity: 0.15,
            zIndex: 50
          });

          map.add(circle);

          markers.push(marker);
          circles.push(circle);
        });

        map.setFitView(markers);

        updateLabels();

        document.getElementById("result").innerHTML =
          "已找到 " + stores.length + " 个地点。<br>" +
          "放大地图后会显示门店名称。<br>" +
          "点击地图任意位置，可检测是否落入保护圈。";
      });
    }

    // 点击地图，检测选址点是否落入保护圈
    map.on("click", function(e) {
      if (stores.length === 0) {
        alert("请先点击“检测覆盖范围”");
        return;
      }

      const clickLngLat = e.lnglat;

      if (testMarker) {
        map.remove(testMarker);
      }

      testMarker = new AMap.Marker({
        position: clickLngLat,
        map: map,
        icon: "https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png",
        offset: new AMap.Pixel(-10, -28)
      });

      let nearestStore = null;
      let nearestDistance = Infinity;

      stores.forEach(store => {
        const distance = AMap.GeometryUtil.distance(
          clickLngLat,
          new AMap.LngLat(store.lng, store.lat)
        );

        if (distance < nearestDistance) {
          nearestDistance = distance;
          nearestStore = store;
        }
      });

      const radius = Number(document.getElementById("radius").value);
      const distanceText = Math.round(nearestDistance);

      if (nearestDistance < radius) {
        document.getElementById("result").innerHTML =
          "结果：不建议<br>" +
          "最近门店：" + nearestStore.name + "<br>" +
          "距离：" + distanceText + " 米<br>" +
          "原因：落入 " + radius + " 米保护范围";
      } else {
        document.getElementById("result").innerHTML =
          "结果：距离上可能符合<br>" +
          "最近门店：" + nearestStore.name + "<br>" +
          "距离：" + distanceText + " 米<br>" +
          "说明：未落入 " + radius + " 米保护范围";
      }
    });
  </script>
</body>
</html>
