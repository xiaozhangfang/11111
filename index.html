<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>蜜雪冰城700米保护圈地图</title>

  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    #panel {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 999;
      background: white;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 10px #999;
      font-size: 14px;
    }

    input, button {
      height: 30px;
      margin: 4px;
    }

    #result {
      margin-top: 8px;
      line-height: 1.6;
      max-width: 280px;
    }
  </style>

  <script>
    window._AMapSecurityConfig = {
      securityJsCode: "1bfe2616169779ee7c350d5299c441b8"
    };
  </script>

  <script src="https://webapi.amap.com/maps?v=2.0&key=233bf77ae060be738d6e2caf902ecdbf&plugin=AMap.PlaceSearch,AMap.GeometryUtil"></script>
</head>

<body>
  <div id="panel">
    <div>
      地点：
      <input id="place" value="鹤壁市" />
    </div>

    <div>
      品牌：
      <input id="keyword" value="蜜雪冰城" />
    </div>

    <div>
      半径：
      <input id="radius" value="700" /> 米
    </div>

    <button onclick="searchStores()">检测覆盖范围</button>

    <div id="result">输入城市或详细地点后，点击检测覆盖范围</div>
  </div>

  <div id="map"></div>

  <script>
    let map = new AMap.Map("map", {
      zoom: 12,
      center: [114.29745, 35.747]
    });

    let markers = [];
    let circles = [];
    let stores = [];
    let testMarker = null;
    let placeMarker = null;

    function clearMap() {
      markers.forEach(marker => map.remove(marker));
      circles.forEach(circle => map.remove(circle));

      markers = [];
      circles = [];
      stores = [];

      if (testMarker) {
        map.remove(testMarker);
        testMarker = null;
      }

      if (placeMarker) {
        map.remove(placeMarker);
        placeMarker = null;
      }
    }

    function updateLabels() {
      const zoom = map.getZoom();

      markers.forEach((marker, index) => {
        if (zoom >= 15) {
          marker.setLabel({
            direction: "top",
            offset: new AMap.Pixel(0, -5),
            content: `<div style="
              background:white;
              border:1px solid #ff4d4f;
              padding:2px 5px;
              border-radius:4px;
              font-size:11px;
              color:#d60000;
              white-space:nowrap;
              box-shadow:0 1px 4px rgba(0,0,0,0.2);
            ">${stores[index].name}</div>`
          });
        } else {
          marker.setLabel(null);
        }
      });
    }

    map.on("zoomend", function () {
      updateLabels();
    });

    function searchStores() {
      clearMap();

      const place = document.getElementById("place").value;
      const keyword = document.getElementById("keyword").value;
      const radius = Number(document.getElementById("radius").value);

      document.getElementById("result").innerHTML = "正在搜索，请稍等...";

      const placeSearch = new AMap.PlaceSearch({
        pageSize: 50,
        pageIndex: 1
      });

      placeSearch.search(place, function(status, placeResult) {
        if (status !== "complete" || !placeResult.poiList || placeResult.poiList.pois.length === 0) {
          alert("没有找到这个地点");
          document.getElementById("result").innerHTML = "没有找到这个地点";
          return;
        }

        const targetPoi = placeResult.poiList.pois[0];
        const targetLng = targetPoi.location.lng;
        const targetLat = targetPoi.location.lat;

        map.setZoomAndCenter(15, [targetLng, targetLat]);

        placeMarker = new AMap.Marker({
          position: [targetLng, targetLat],
          map: map,
          icon: "https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png",
          offset: new AMap.Pixel(-10, -28),
          title: targetPoi.name
        });

        const storeSearch = new AMap.PlaceSearch({
          city: place,
          citylimit: false,
          pageSize: 50,
          pageIndex: 1
        });

        storeSearch.search(keyword, function(status, result) {
          if (status !== "complete" || !result.poiList || !result.poiList.pois) {
            alert("没有搜到门店，请检查品牌名称");
            document.getElementById("result").innerHTML = "没有搜到门店";
            return;
          }

          const pois = result.poiList.pois;

          pois.forEach(poi => {
            const lng = poi.location.lng;
            const lat = poi.location.lat;

            stores.push({
              name: poi.name,
              address: poi.address,
              lng: lng,
              lat: lat
            });

            const marker = new AMap.Marker({
              position: [lng, lat],
              title: poi.name,
              map: map,
              icon: new AMap.Icon({
                image: "https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png",
                size: new AMap.Size(20, 28),
                imageSize: new AMap.Size(20, 28)
              }),
              offset: new AMap.Pixel(-10, -28)
            });

            const infoWindow = new AMap.InfoWindow({
              content: `
                <div style="font-size:14px;line-height:1.6;">
                  <b>${poi.name}</b><br/>
                  地址：${poi.address || "暂无地址"}<br/>
                  经纬度：${lng}, ${lat}
                </div>
              `,
              offset: new AMap.Pixel(0, -28)
            });

            marker.on("click", function () {
              infoWindow.open(map, marker.getPosition());
            });

            const circle = new AMap.Circle({
              center: new AMap.LngLat(lng, lat),
              radius: radius,
              strokeColor: "#ff0000",
              strokeWeight: 2,
              strokeOpacity: 0.8,
              fillColor: "#ff0000",
              fillOpacity: 0.15,
              zIndex: 50
            });

            map.add(circle);

            markers.push(marker);
            circles.push(circle);
          });

          updateLabels();

          document.getElementById("result").innerHTML =
            "已定位：" + targetPoi.name + "<br>" +
            "已找到 " + stores.length + " 个“" + keyword + "”。<br>" +
            "红色箭头是门店，蓝色箭头是你搜索的位置。<br>" +
            "放大地图后会显示门店名称。<br>" +
            "点击地图任意位置，可检测是否落入保护圈。";
        });
      });
    }

    map.on("click", function(e) {
      if (stores.length === 0) {
        alert("请先点击“检测覆盖范围”");
        return;
      }

      const clickLngLat = e.lnglat;

      if (testMarker) {
        map.remove(testMarker);
      }

      testMarker = new AMap.Marker({
        position: clickLngLat,
        map: map,
        icon: "https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png",
        offset: new AMap.Pixel(-10, -28)
      });

      let nearestStore = null;
      let nearestDistance = Infinity;

      stores.forEach(store => {
        const distance = AMap.GeometryUtil.distance(
          clickLngLat,
          new AMap.LngLat(store.lng, store.lat)
        );

        if (distance < nearestDistance) {
          nearestDistance = distance;
          nearestStore = store;
        }
      });

      const radius = Number(document.getElementById("radius").value);
      const distanceText = Math.round(nearestDistance);

      if (nearestDistance < radius) {
        document.getElementById("result").innerHTML =
          "结果：不建议<br>" +
          "最近门店：" + nearestStore.name + "<br>" +
          "距离：" + distanceText + " 米<br>" +
          "原因：落入 " + radius + " 米保护范围";
      } else {
        document.getElementById("result").innerHTML =
          "结果：距离上可能符合<br>" +
          "最近门店：" + nearestStore.name + "<br>" +
          "距离：" + distanceText + " 米<br>" +
          "说明：未落入 " + radius + " 米保护范围";
      }
    });
  </script>
</body>
</html>
